name: Publish VSCode Extension Pre-Release

on:
  workflow_dispatch:
    inputs:
      extension-name:
        description: name of the extension, e.g. vscode-spring-boot
        required: true
        type: string
  workflow_call:
    inputs:
      extension-name:
        description: name of the extension, e.g. vscode-spring-boot
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-vscode-extension:
    runs-on: ubuntu-latest
    name: Publish Pre-Release for VSCode Extension '${{ inputs.extension-name }}'
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout vscode-extensions code and workflow scripts
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # 7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # 7.0.0
        with:
          node-version: 22
      - name: Install vsce
        run: npm install --global @vscode/vsce
      - name: Update Changelog
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Determine the label based on the extension name by stripping the 'vscode-' prefix
          EXTENSION_NAME="${{ inputs.extension-name }}"
          LABEL_NAME="${EXTENSION_NAME#vscode-}"
          
          # Special case for spring-boot which uses "for: vscode" instead of "theme: spring-boot-support"
          if [ "$EXTENSION_NAME" == "vscode-spring-boot" ]; then
            LABEL="label:\"for: vscode\""
          else
            LABEL="label:\"theme: ${LABEL_NAME}-support\""
          fi
          
          # Run the script to update the changelog
          ./.github/scripts/generate-prerelease-changelog.sh ${{ inputs.extension-name }} "$LABEL"
      - name: Set up JDK 25
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # 5.6.0
        with:
          java-version: '25'
          distribution: 'temurin'
      - name: Build .VSIX file
        id: build-vsix
        run: |
          ${{ github.workspace }}/.github/scripts/build-vscode-extension.sh ${{ inputs.extension-name }} pre
          ls ./vsix
      - name: Publish to VSCode Marketplace
        id: publish-pre-release
        run: |
          vsix_file=`ls ./vsix | head -n 1`
          echo "VSCode VSIX pre-release file to publish ${vsix_file}"
          vsce publish --pre-release -p ${{ secrets.VSCE_PUBLISH_TOKEN }} --packagePath ./vsix/$vsix_file
      - name: Publish to Eclipse Open VSX
        id: publish-pre-release-ovsx
        run: |
          npm install --global ovsx
          vsix_file=`ls ./vsix | head -n 1`
          echo "Open-VSX VSIX pre-release file to publish ${vsix_file}"
          ovsx publish --pre-release -p ${{ secrets.OVSX_PUBLISH_TOKEN }} --packagePath ./vsix/$vsix_file
          
      - name: Commit and Push Changelog
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Commit and push the changes if the changelog was modified
          if [[ -n $(git status -s vscode-extensions/${{ inputs.extension-name }}/CHANGELOG.md) ]]; then
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git add ./vscode-extensions/${{ inputs.extension-name }}/CHANGELOG.md
            git commit -m "Update pre-release changelog for ${{ inputs.extension-name }}"
            
            # Retry loop for git push to handle parallel workflow conflicts
            max_retries=5
            retry_count=0
            
            # Get current branch name
            CURRENT_BRANCH=$(git branch --show-current)
            if [ -z "$CURRENT_BRANCH" ]; then
              # If in detached HEAD (like actions/checkout often is), we push to the ref that triggered the workflow
              CURRENT_BRANCH=${GITHUB_REF#refs/heads/}
            fi
            
            while [ $retry_count -lt $max_retries ]; do
              if git push origin HEAD:$CURRENT_BRANCH; then
                echo "Successfully pushed changelog updates."
                break
              else
                echo "Push failed, attempting to pull and rebase (attempt $((retry_count + 1)) of $max_retries)..."
                git pull --rebase --autostash origin $CURRENT_BRANCH
                retry_count=$((retry_count + 1))
                # Add a small random sleep to prevent perfectly synced retries
                sleep $((RANDOM % 5 + 1))
              fi
            done
            
            if [ $retry_count -eq $max_retries ]; then
              echo "Failed to push changelog updates after $max_retries attempts."
              exit 1
            fi
          else
            echo "No changes to the changelog."
          fi
