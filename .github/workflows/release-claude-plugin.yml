name: Release Claude Plugin

on:
  workflow_call:
    inputs:
      plugin-name:
        description: name of the plugin, e.g. spring-boot
        required: true
        type: string
      dist:
        description: release, pre, snapshot
        required: false
        type: string
        default: snapshot

permissions:
  contents: write

env:
  AWS_ACCESS_KEY_ID: ${{ secrets.CDN_S3_ACCESS_KEY }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.CDN_S3_SECRET_KEY  }}
  AWS_DEFAULT_REGION: us-east-1
  AWS_ENDPOINT_URL_S3:  ${{ secrets.CDN_S3_ENDPOINT }}
  AWS_S3_BUCKET: ${{ secrets.CDN_BUCKET }}/spring-tools
  DOWNLOAD_URL_ROOT: https://cdn.spring.io/spring-tools

jobs:
  build-claude-plugin:
    runs-on: ubuntu-latest
    name: Release Claude Plugin '${{ inputs.plugin-name }}'
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
      - name: Set up JDK 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # 5.2.0
        with:
          java-version: '25'
          distribution: 'temurin'
      - name: Build and Package
        id: build-plugin
        run: |
          ${{ github.workspace }}/.github/scripts/build-claude-plugin.sh ${{ inputs.plugin-name }} ${{ inputs.dist }}
          ls ./claude-dist
      - name: Upload Plugin Tarball
        id: upload-release
        if: ${{ inputs.dist == 'release' }}
        run: |
          tar_file=`ls ./claude-dist | head -n 1`
          echo "Tarball to upload ${tar_file}"
          base_version=`jq -r .version claude-plugins/${{ inputs.plugin-name }}/.claude-plugin/plugin.json`
          
          s3_path=${{ inputs.dist }}/claude-plugins/${{ inputs.plugin-name }}/$base_version
          echo "S3 path: ${s3_path}"
          aws s3 rm s3://$AWS_S3_BUCKET/$s3_path/ --recursive
          aws s3 cp ./claude-dist/$tar_file s3://$AWS_S3_BUCKET/$s3_path/$tar_file --no-progress
          echo "version=$base_version" >> $GITHUB_OUTPUT
          echo "s3_url=${DOWNLOAD_URL_ROOT}/$s3_path/$tar_file" >> $GITHUB_OUTPUT
      - name: Update Marketplace JSON
        if: ${{ inputs.dist == 'release' }}
        run: |
          aws s3 cp s3://$AWS_S3_BUCKET/${{ inputs.dist }}/claude-plugins/marketplace.json ./marketplace.json || echo '{"name": "spring-official-marketplace", "description": "Official Spring Claude Code plugins.", "owner": {"name": "Spring Tools"}, "plugins": []}' > ./marketplace.json
          
          tar_file=`ls ./claude-dist | head -n 1`
          base_version=`jq -r .version claude-plugins/${{ inputs.plugin-name }}/.claude-plugin/plugin.json`
          tar_url="${DOWNLOAD_URL_ROOT}/${{ inputs.dist }}/claude-plugins/${{ inputs.plugin-name }}/${base_version}/${tar_file}"
          
          description=`jq -r .description claude-plugins/${{ inputs.plugin-name }}/.claude-plugin/plugin.json`
          author_name=`jq -r .author.name claude-plugins/${{ inputs.plugin-name }}/.claude-plugin/plugin.json`
          
          tmp=$(mktemp)
          jq --arg name "${{ inputs.plugin-name }}" \
             --arg version "$base_version" \
             --arg source "$tar_url" \
             --arg description "$description" \
             --arg author "$author_name" \
             '
             .plugins |= if map(.name == $name) | any then
                 map(if .name == $name then .version=$version | .source=$source else . end)
             else
                 . + [{"name": $name, "version": $version, "source": $source, "description": $description, "author": {"name": $author}}]
             end
             ' ./marketplace.json > "$tmp" && mv "$tmp" ./marketplace.json
             
          cat ./marketplace.json
          aws s3 cp ./marketplace.json s3://$AWS_S3_BUCKET/${{ inputs.dist }}/claude-plugins/marketplace.json --no-progress
