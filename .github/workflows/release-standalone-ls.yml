name: Release Standalone LS

on:
  workflow_dispatch:
    inputs:
      dist:
        description: release, pre, snapshot
        required: false
        type: string
        default: snapshot
  workflow_call:
    inputs:
      dist:
        description: release, pre, snapshot
        required: false
        type: string
        default: snapshot

permissions:
  contents: write

env:
  AWS_ACCESS_KEY_ID: ${{ secrets.CDN_S3_ACCESS_KEY }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.CDN_S3_SECRET_KEY  }}
  AWS_DEFAULT_REGION: us-east-1
  AWS_ENDPOINT_URL_S3:  ${{ secrets.CDN_S3_ENDPOINT }}
  AWS_S3_BUCKET: ${{ secrets.CDN_BUCKET }}/spring-tools
  DOWNLOAD_URL_ROOT: https://cdn.spring.io/spring-tools

jobs:
  build-standalone-ls:
    runs-on: ubuntu-latest
    name: Build Standalone LS Release
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # 7.0.0
      - name: Set up JDK 25
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # 5.4.0
        with:
          java-version: '25'
          distribution: 'temurin'
      - name: Build and Package
        id: build-jar
        run: |
          ${{ github.workspace }}/.github/scripts/build-standalone-ls.sh ${{ inputs.dist }}
          ls ./standalone-ls-dist
      - name: Upload Standalone JAR
        id: upload-release
        if: ${{ inputs.dist == 'release' }}
        run: |
          jar_file="spring-boot-language-server-standalone-exec.jar"
          base_version=$(cat ./standalone-ls-dist/version.txt)
          
          s3_path=${{ inputs.dist }}/language-server/spring-boot/$base_version
          echo "S3 path: ${s3_path}"
          aws s3 rm s3://$AWS_S3_BUCKET/$s3_path/ --recursive
          aws s3 cp ./standalone-ls-dist/$jar_file s3://$AWS_S3_BUCKET/$s3_path/$jar_file --no-progress
          echo "version=$base_version" >> $GITHUB_OUTPUT
      - name: Create and Push Tag
        id: create-tag
        if: ${{ inputs.dist == 'release' }}
        run: |
          version="${{ steps.upload-release.outputs.version }}"
          tag="v${version}"
          git tag "$tag"
          git push origin "$tag"
          echo "tag=$tag" >> $GITHUB_OUTPUT
      - name: Update Marketplace JSON
        if: ${{ inputs.dist == 'release' }}
        run: |
          aws s3 cp s3://$AWS_S3_BUCKET/${{ inputs.dist }}/claude-plugins/marketplace.json ./marketplace.json || echo '{"name": "spring-tools-marketplace", "description": "Spring Tools Claude Code plugins.", "owner": {"name": "Spring Tools"}, "plugins": []}' > ./marketplace.json
          
          version="${{ steps.upload-release.outputs.version }}"
          ref="${{ steps.create-tag.outputs.tag }}"
          
          tmp=$(mktemp)
          jq --arg name "spring-tools" \
             --arg version "$version" \
             --arg ref "$ref" \
             '
             .plugins |= if map(.name == $name) | any then
                 map(if .name == $name then .version=$version | .source.ref=$ref else . end)
             else
                 . + [{
                    "name": $name, 
                    "version": $version, 
                    "source": {
                      "source": "git-subdir",
                    "url": "https://github.com/spring-projects/spring-tools.git",
                    "path": "claude-plugins/spring-tools",
                      "ref": $ref
                    }, 
                    "description": "Spring Boot Language Server", 
                    "author": {"name": "Spring Tools"}
                 }]
             end
             ' ./marketplace.json > "$tmp" && mv "$tmp" ./marketplace.json
             
          cat ./marketplace.json
          aws s3 cp ./marketplace.json s3://$AWS_S3_BUCKET/${{ inputs.dist }}/claude-plugins/marketplace.json --no-progress
